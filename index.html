<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <input type="text" placeholder="0" id="inputid">
    <div class="cal" >
    <div class="row-1">
        <button class="operator">AC</button>
        <button class="operator">DEL</button>
        <button class="operator">%</button>
        <button class="operator">/</button>
    </div>
    <div class="row-2">
        <button class="digits">7</button>
        <button class="digits">8</button>
        <button class="digits">9</button>
        <button class="operator">*</button>
    </div>
    <div class="row-3">
        <button class="digits">4</button>
        <button class="digits">5</button>
        <button class="digits">6</button>
        <button class="operator">-</button>
    </div>
    <div class="row-4">
        <button class="digits">1</button>
        <button class="digits">2</button>
        <button class="digits">3</button>
        <button class="operator">+</button>
    </div>
    <div class="row-5">
        <button class="digits">00</button>
        <button class="digits">0</button>
        <button class="digits">.</button>
        <button class="operator equal">=</button>
    </div>
    </div>
</div>
<script>
  const input = document.getElementById("inputid");
  const buttons = document.querySelectorAll("button");

  let expression = "";

  buttons.forEach(button => {
    button.addEventListener("click", e => {
      const value = e.target.textContent;

      if (value === "AC") {
        expression = "";
        input.value = "0";
      } 
      else if (value === "DEL") {
        expression = expression.slice(0, -1);
        input.value = expression || "0";
      } 
      else if (value === "=") {
        try {
          expression = eval(expression).toString();
          input.value = expression;
        } catch {
          input.value = "Error";
          expression = "";
        }
      } 
      else {
        expression += value;
        input.value = expression;
      }
    });
  });
</script>
</body>
</html>
